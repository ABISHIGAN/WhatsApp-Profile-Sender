<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Profile Sender</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6fb; color: #1e2432; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        h1 { margin-bottom: 0.5rem; font-size: 2rem; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 16px 40px rgba(15, 23, 42, 0.06); margin-bottom: 20px; }
        .button { background: #2f80ed; color: white; border: none; border-radius: 8px; padding: 12px 18px; cursor: pointer; font-size: 16px; }
        .button:disabled { background: #9bb4e6; cursor: not-allowed; }
        .status { margin-top: 12px; line-height: 1.6; white-space: pre-wrap; }
        #qr-container { display: none; text-align: center; margin-top: 18px; }
        #qrcode { display: inline-block; padding: 12px; background: #fff; border-radius: 12px; }
        .field { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        input[type=text] { flex: 1; min-width: 220px; padding: 12px 14px; border: 1px solid #d8dee9; border-radius: 8px; }
        .line { margin: 8px 0; padding: 10px 12px; border-radius: 10px; background: #f5f7fb; }

        .line.success { border-left: 4px solid #27ae60; }
        .line.warning { border-left: 4px solid #f2994a; }
        .line.error { border-left: 4px solid #eb5757; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WhatsApp Profile Sender</h1>
        <div class="card">
            <div class="field">
                <button id="auth-button" class="button">Authenticate WhatsApp</button>
                <button id="refresh-button" class="button" disabled>Refresh QR</button>
            </div>
            <div id="status-messages" class="status"></div>
            <div id="qr-container">
                <div id="qrcode"></div>
                <div style="margin-top: 16px; color: #4f5d78;">Scan this QR code with WhatsApp on your phone.</div>
            </div>
        </div>

        <div class="card">
            <div class="field">
                <input id="group-name" type="text" placeholder="Enter WhatsApp group name" disabled />
                <button id="search-group" class="button" disabled>Search Group & Send</button>
            </div>
            <div id="group-status" class="status"></div>
        </div>

        <div class="card">
            <h2>Activity Log</h2>
            <div id="log" class="status"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const socket = io();
        const authButton = document.getElementById('auth-button');
        const refreshButton = document.getElementById('refresh-button');
        const qrContainer = document.getElementById('qr-container');
        const qrcodeEl = document.getElementById('qrcode');
        const groupNameInput = document.getElementById('group-name');
        const searchGroupButton = document.getElementById('search-group');
        const statusMessages = document.getElementById('status-messages');
        const groupStatus = document.getElementById('group-status');
        const log = document.getElementById('log');
        let qrCode = null;
        let isReady = false;
        let isAuthenticated = false;

        function addLog(text, type='') {
            const line = document.createElement('div');
            line.className = 'line' + (type ? ' ' + type : '');
            line.textContent = text;
            log.prepend(line);
        }

        function setStatus(text) {
            statusMessages.textContent = text;
        }

        function setGroupStatus(text) {
            groupStatus.textContent = text;
        }

        function renderQr(qr) {
            qrContainer.style.display = 'block';
            qrcodeEl.innerHTML = '';
            qrCode = new QRCode(qrcodeEl, {
                text: qr,
                width: 256,
                height: 256,
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        authButton.addEventListener('click', () => {
            authButton.disabled = true;
            setStatus('Starting WhatsApp authentication...');
            socket.emit('startAuthentication');
        });

        refreshButton.addEventListener('click', () => {
            if (isReady) {
                setStatus('Logging out and refreshing QR...');
                socket.emit('refreshQR');
                return;
            }
            setStatus('Waiting for new QR code...');
            socket.emit('startAuthentication');
        });

        searchGroupButton.addEventListener('click', () => {
            const groupName = groupNameInput.value.trim();
            if (!groupName) return;
            setGroupStatus(`Searching for group "${groupName}"...`);
            addLog(`Searching group: ${groupName}`, '');
            searchGroupButton.disabled = true;
            groupNameInput.disabled = true;
            socket.emit('searchGroup', groupName);
        });

        socket.on('clientState', state => {
            if (state.qr) {
                renderQr(state.qr);
                setStatus('Scan the QR code to sign in.');
                refreshButton.disabled = false;
            }
            if (state.authenticated) {
                setStatus('✅ Authenticated successfully!');
                addLog('✅ Authenticated successfully!', 'success');
            }
            if (state.ready) {
                setStatus('✅ Authenticated successfully!\n🚀 WhatsApp client is ready!');
                addLog('🚀 WhatsApp client is ready!', 'success');
                groupNameInput.disabled = false;
                searchGroupButton.disabled = false;
                qrContainer.style.display = 'none';
                refreshButton.disabled = false;
            }
        });

        socket.on('qr', qr => {
            renderQr(qr);
            setStatus('Scan the QR code to sign in.');
            refreshButton.disabled = false;
        });

        socket.on('authenticated', () => {
            setStatus('✅ Authenticated successfully!');
            addLog('✅ Authenticated successfully!', 'success');
        });

        socket.on('ready', () => {
            setStatus('✅ Authenticated successfully!\n🚀 WhatsApp client is ready!');
            addLog('🚀 WhatsApp client is ready!', 'success');
            groupNameInput.disabled = false;
            searchGroupButton.disabled = false;
            qrContainer.style.display = 'none';
            refreshButton.disabled = false;
            isReady = true;
            isAuthenticated = true;
        });

        socket.on('loggedOut', () => {
            setStatus('Logged out. Scan the new QR code to authenticate again.');
            addLog('⚠️ Logged out and refreshed QR.', 'warning');
            isReady = false;
            isAuthenticated = false;
            groupNameInput.disabled = true;
            searchGroupButton.disabled = true;
            authButton.disabled = false;
            refreshButton.disabled = true;
            qrContainer.style.display = 'block';
        });

        socket.on('authFailure', message => {
            setStatus('❌ Authentication failed. ' + message);
            addLog('❌ Authentication failed: ' + message, 'error');
            authButton.disabled = false;
        });

        socket.on('groupFound', data => {
            setGroupStatus(`✅ Found group: "${data.name}" (${data.members} members)`);
            addLog(`✅ Found group: "${data.name}" (${data.members} members)`, 'success');
        });

        socket.on('groupNotFound', data => {
            setGroupStatus(`❌ Group "${data.query}" not found.`);
            addLog(`❌ Group "${data.query}" not found.`, 'error');
            if (data.groups?.length) {
                addLog('Available groups: ' + data.groups.join(', '), '');
            }
            groupNameInput.disabled = false;
            searchGroupButton.disabled = false;
        });

        socket.on('memberStatus', data => {
            let text;
            let type = '';
            if (data.status === 'sent') {
                text = `✅ Sent: ${data.name}`;
                type = 'success';
            } else if (data.status === 'noPhoto') {
                text = `⚠️ No photo: ${data.name}`;
                type = 'warning';
            } else {
                text = `❌ Failed: ${data.name} — ${data.error}`;
                type = 'error';
            }
            addLog(text, type);
        });

        socket.on('groupStats', data => {
            addLog(`ℹ️ Members with name/profile: ${data.withName}`, '');
            addLog(`ℹ️ Members without profile name: ${data.withoutName}`, '');
        });

        socket.on('done', data => {
            const doneText = `🎉 Done! Sent: ${data.sent} | Skipped: ${data.skipped}`;
            setGroupStatus(doneText);
            addLog(doneText, 'success');
            groupNameInput.disabled = false;
            searchGroupButton.disabled = false;
        });

        socket.on('errorMessage', message => {
            addLog(`❌ Error: ${message}`, 'error');
            setGroupStatus(`❌ Error: ${message}`);
            groupNameInput.disabled = false;
            searchGroupButton.disabled = false;
        });

        socket.on('disconnected', reason => {
            addLog(`⚠️ Disconnected: ${reason}`, 'warning');
            setStatus('⚠️ WhatsApp client disconnected. Reload the page and authenticate again.');
            groupNameInput.disabled = true;
            searchGroupButton.disabled = true;
            authButton.disabled = false;
            refreshButton.disabled = true;
        });
    </script>
</body>
</html>
